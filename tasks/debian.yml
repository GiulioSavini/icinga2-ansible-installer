---
- name: Add Icinga2 GPG key
  ansible.builtin.apt_key:
    url: https://packages.icinga.com/icinga.key
    state: present

- name: Install icinga2
  ansible.builtin.apt:
    name: icinga2
    state: present
    update_cache: true

- name: Install monitoring-plugins
  ansible.builtin.apt:
    name: monitoring-plugins
    state: present

- name: Fix pki dir ownership (workaround chiavi)
  ansible.builtin.file:
    path: /etc/icinga2/pki
    owner: nagios
    group: nagios
    mode: "0755"
    state: directory
  failed_when: false
