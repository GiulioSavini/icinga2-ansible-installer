---
- name: Download Icinga2 packages from NetEye Share
  shell: |
    mkdir -p /tmp/rhel8
    wget -r -np -nH --cut-dirs=4 -R "index.html*" \
      {{ icinga2_rhel8_base_url }} \
      -P /tmp/rhel8
  args:
    executable: /bin/bash
    creates: /tmp/rhel8

- name: Install Icinga2 RPMs
  shell: |
    cd /tmp/rhel8/8/RPMS/x86_64/install_{{ icinga2_rhel8_version }}/
    yum install -y icinga2-{{ icinga2_rhel8_version }}-1.el8.x86_64.rpm \
                   icinga2-bin-{{ icinga2_rhel8_version }}-1.el8.x86_64.rpm \
                   icinga2-common-{{ icinga2_rhel8_version }}-1.el8.x86_64.rpm
  args:
    executable: /bin/bash

- name: Install EPEL for Nagios plugins
  yum:
    name: https://dl.fedoraproject.org/pub/epel/epel-release-latest-8.noarch.rpm
    state: present

- name: Install nagios-plugins-all
  yum:
    name: nagios-plugins-all
    state: present
  ignore_errors: yes
