# Inventario Ansible per Icinga2 agent installation
# Modifica con i tuoi host
#
# Variabili utili:
#   ansible_host        = IP o hostname
#   ansible_user        = utente SSH
#   ansible_ssh_pass    = password SSH (meglio usare chiavi)
#   ansible_become_pass = password sudo
#   ansible_port        = porta SSH (default 22)

[linux_servers]
# server1  ansible_host=192.168.1.10  ansible_user=root
# server2  ansible_host=192.168.1.11  ansible_user=admin
# server3  ansible_host=10.0.0.50     ansible_user=deploy  ansible_port=2222
